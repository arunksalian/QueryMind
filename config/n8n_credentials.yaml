# n8n credential references
# These map to credentials stored in your n8n instance.
# The agent uses these IDs when generating node definitions.
# Get credential IDs from: GET http://localhost:5678/api/v1/credentials

credentials:
  postgres:
    id: "1"
    name: "PostgreSQL Dev"
    type: "postgres"

  mongodb:
    id: "2"
    name: "MongoDB Dev"
    type: "mongoDb"

  # Add more as needed:
  # mysql:
  #   id: "3"
  #   name: "MySQL Production"
  #   type: "mySql"

# n8n workflow defaults
workflow_defaults:
  trigger_type: "manualTrigger"
  node_spacing_x: 250
  node_spacing_y: 0
  start_position_x: 250
  start_position_y: 300
